name: Build

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - '.github/**'
      - '.github/assets/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run tests
        run: ./gradlew testDebugUnitTest --build-cache

  build:
    runs-on: ubuntu-24.04
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install Android SDK components
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Get app version
        id: appversion
        run: |
          set -euo pipefail
          VERSION=$(./gradlew -q printVersionName)
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_hash=${SHORT_HASH}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION} (${SHORT_HASH})"

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.keystore"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK
        run: ./gradlew assembleRelease --build-cache
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK with version
        run: |
          set -euo pipefail
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/wheelwitch-${VERSION}-${SHORT_HASH}.apk"
          mv app/build/outputs/apk/release/app-release.apk.idsig \
             "app/build/outputs/apk/release/wheelwitch-${VERSION}-${SHORT_HASH}.apk.idsig"
        env:
          VERSION: ${{ steps.appversion.outputs.version }}
          SHORT_HASH: ${{ steps.appversion.outputs.short_hash }}

      - name: Verify APK signatures and compute hash
        id: verify
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/wheelwitch-${VERSION}-${SHORT_HASH}.apk"
          APKSIGNER="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          "$APKSIGNER" verify --verbose --print-certs "$APK"
          SHA256=$(sha256sum "$APK" | awk '{print $1}')
          CERT_SHA256=$("$APKSIGNER" verify --print-certs "$APK" \
            | awk -F': ' '/Signer #1 certificate SHA-256 digest:/{print $2; exit}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "cert_sha256=$CERT_SHA256" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ steps.appversion.outputs.version }}
          SHORT_HASH: ${{ steps.appversion.outputs.short_hash }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheelwitch-${{ steps.appversion.outputs.version }}-${{ steps.appversion.outputs.short_hash }}
          path: |
            app/build/outputs/apk/release/wheelwitch-${{ steps.appversion.outputs.version }}-${{ steps.appversion.outputs.short_hash }}.apk
            app/build/outputs/apk/release/wheelwitch-${{ steps.appversion.outputs.version }}-${{ steps.appversion.outputs.short_hash }}.apk.idsig
          retention-days: 7

      - name: Update CI release
        uses: ncipollo/release-action@v1
        with:
          tag: ci
          name: WheelWitch ${{ steps.appversion.outputs.version }} (${{ steps.appversion.outputs.short_hash }})
          generateReleaseNotes: true
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifacts: |
            app/build/outputs/apk/release/wheelwitch-${{ steps.appversion.outputs.version }}-${{ steps.appversion.outputs.short_hash }}.apk
            app/build/outputs/apk/release/wheelwitch-${{ steps.appversion.outputs.version }}-${{ steps.appversion.outputs.short_hash }}.apk.idsig
          body: |
            ## WheelWitch ${{ steps.appversion.outputs.version }} (${{ steps.appversion.outputs.short_hash }})

            - **Signing certificate SHA-256:** `${{ steps.verify.outputs.cert_sha256 }}`
            - **APK SHA-256:** `${{ steps.verify.outputs.sha256 }}`
            - [Verify with AppVerifier](https://github.com/soupslurpr/AppVerifier)
          token: ${{ secrets.GITHUB_TOKEN }}
