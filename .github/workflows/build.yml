name: Build

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - '.github/**'
      - '.github/assets/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew testDebugUnitTest --build-cache

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Get app version
        id: appversion
        run: |
          set -euo pipefail
          VERSION=$(./gradlew -q :app:printVersionName 2>/dev/null)
          SHORT_HASH=$(git rev-parse --short HEAD)
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to read versionName from gradle"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_hash=${SHORT_HASH}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION} (${SHORT_HASH})"

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.keystore"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK
        run: ./gradlew assembleRelease --build-cache
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK with version
        run: |
          set -euo pipefail
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/wheelwitch-${VERSION}-${SHORT_HASH}.apk"
        env:
          VERSION: ${{ steps.appversion.outputs.version }}
          SHORT_HASH: ${{ steps.appversion.outputs.short_hash }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheelwitch-${{ steps.appversion.outputs.version }}-${{ steps.appversion.outputs.short_hash }}
          path: app/build/outputs/apk/release/wheelwitch-${{ steps.appversion.outputs.version }}-${{ steps.appversion.outputs.short_hash }}.apk
          retention-days: 7

      - name: Update CI release
        uses: ncipollo/release-action@v1
        with:
          tag: ci
          name: WheelWitch ${{ steps.appversion.outputs.version }} (${{ steps.appversion.outputs.short_hash }})
          generateReleaseNotes: true
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifacts: app/build/outputs/apk/release/wheelwitch-${{ steps.appversion.outputs.version }}-${{ steps.appversion.outputs.short_hash }}.apk
          token: ${{ secrets.GITHUB_TOKEN }}
